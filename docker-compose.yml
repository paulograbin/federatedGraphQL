services:
  shows-service:
    build: ./shows-service
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  reviews-service:
    build: ./reviews-service
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  gateway:
    build: ./gateway
    ports:
      - "9000:9000"
    depends_on:
      shows-service:
        condition: service_healthy
      reviews-service:
        condition: service_healthy
    environment:
      SUBGRAPH_SHOWS_URL: http://shows-service:8081/graphql
      SUBGRAPH_REVIEWS_URL: http://reviews-service:8082/graphql
