server:
  port: 9000

spring:
  application:
    name: federation-gateway
  threads:
    virtual:
      enabled: true

subgraph:
  shows:
    url: ${SUBGRAPH_SHOWS_URL:http://localhost:8081/graphql}
  reviews:
    url: ${SUBGRAPH_REVIEWS_URL:http://localhost:8082/graphql}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,env,configprops
  metrics:
    tags:
      application: federation-gateway
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    io.github.resilience4j: DEBUG
